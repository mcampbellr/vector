    <script>
      // No-flash boot: apply the persisted/OS theme before first paint. Mirrors
      // (does not replace) ThemeProvider's resolution. Dependency-free, guarded.
      (function () {
        try {
          var stored = localStorage.getItem('vector-theme')
          var mode = stored === 'light' || stored === 'dark' || stored === 'system' ? stored : 'system'
          var resolved =
            mode === 'system'
              ? window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
              : mode
          document.documentElement.setAttribute('data-theme', resolved)
        } catch (e) {}
      })()
    </script>
